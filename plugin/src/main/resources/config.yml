# MinecrafterGang Dashboard Bridge Configuration
# This plugin exposes an HTTP API for the web dashboard to verify logins and fetch player stats.

# HTTP API server settings
api:
  port: 8089
  # Shared secret key - dashboard must send this in X-API-Key header
  # Change this to a random string!
  key: "mg_change_me_to_a_random_secret"

# CORS - allowed origins for the dashboard
# Set to your dashboard URL, or "*" for testing
cors-origin: "*"
