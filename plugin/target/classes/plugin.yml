name: MinecrafterGang
version: '1.0.0'
main: com.minecraftergang.dashboard.MinecrafterGang
api-version: '1.20'
description: Dashboard API bridge - AuthMe login + player stats
author: MinecrafterGang
depend: [AuthMe]
softdepend: []

commands:
  mgreload:
    description: Reload MinecrafterGang config
    usage: /mgreload
    permission: minecraftergang.admin

permissions:
  minecraftergang.admin:
    description: Admin permission for MinecrafterGang
    default: op
